<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Filtro Selfie de Partículas (Python)</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
        #loading { color: cyan; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Courier New', monospace; font-size: 1.2em; text-align: center; }
    </style>
</head>
<body>
    <div id="loading">Cargando Python...<br>Por favor, permite el acceso a la cámara.</div>

    <script type="py">
        from pyscript import window
        import random

        # Referencia a las funciones de p5.js
        p5 = window

        particles = []
        capture = None

        class Particle:
            def __init__(self, x, y):
                # Importante: p5.width y p5.height solo están disponibles en setup/draw
                self.x = x
                self.y = y
                self.vx = random.uniform(-4, 4)
                self.vy = random.uniform(-4, 4)
                self.alpha = 255
                self.size = random.uniform(5, 12)
                # Colores neón (Cyan/Rosa)
                if random.random() > 0.5:
                    self.color = [0, 255, 255] # Cyan
                else:
                    self.color = [255, 0, 255] # Rosa

            def update(self):
                self.x += self.vx
                self.y += self.vy
                self.alpha -= 8 # Desvanecimiento más rápido
                self.size *= 0.96 # Se achica

            def draw(self):
                p5.noStroke()
                p5.fill(self.color[0], self.color[1], self.color[2], self.alpha)
                p5.circle(self.x, self.y, self.size)

        def setup():
            global capture
            p5.createCanvas(p5.windowWidth, p5.windowHeight)
            
            # Configuración para forzar la cámara frontal (Selfie)
            constraints = {
                'video': {
                    'facingMode': 'user' # 'user' = frontal, 'environment' = trasera
                },
                'audio': False
            }
            capture = p5.createCapture(constraints)
            capture.size(640, 480)
            capture.hide()
            p5.select("#loading").hide()

        def draw():
            # Fondo muy oscuro con estela
            p5.background(0, 15) 
            
            # --- EFECTO ESPEJO ---
            # Movemos el origen al borde derecho y escalamos negativamente en X
            p5.push()
            p5.translate(p5.width, 0)
            p5.scale(-1, 1)
            
            # (Opcional) Dibujar el video de la cámara de fondo
            # p5.image(capture, 0, 0, p5.width, p5.height)
            
            capture.loadPixels()
            
            # Analizamos píxeles aleatorios para buscar movimiento/brillo
            for i in range(0, 30): # Más intentos por frame
                rx = random.randint(0, capture.width - 1)
                ry = random.randint(0, capture.height - 1)
                index = (rx + ry * capture.width) * 4
                
                # Si el píxel es brillante (ropa clara, piel, luces)
                if capture.pixels[index] > 180: 
                    # Mapeamos las coordenadas de la cámara al lienzo
                    screen_x = p5.map(rx, 0, capture.width, 0, p5.width)
                    screen_y = p5.map(ry, 0, capture.height, 0, p5.height)
                    particles.append(Particle(screen_x, screen_y))
            
            # Restauramos la matriz de dibujo para que las partículas no se espejen
            p5.pop()

            # Actualizar y dibujar partículas
            for p in particles[:]:
                p.update()
                p.draw()
                if p.alpha <= 0:
                    particles.remove(p)

        # Inyectamos las funciones en el entorno global
        window.setup = setup
        window.draw = draw
    </script>
</body>
</html>
